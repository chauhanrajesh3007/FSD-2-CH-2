<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
</head>
<body>
   <p id="demo"></p>
   <script>
       function add(a,b){
           document.getElementById("demo").innerHTML=(a+b)
           if ((a+b)>20){clearInterval(timer)}
       }
       a=2 
       b=5
      timer= setInterval(function(){add(++a,++b)},1000)
   </script>
</body>
</html>
